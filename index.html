<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Character Counter - 字符/单词/句子/段落计数工具"><meta property="og:title" content="Character Counter"><title>Character Counter</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:900px;margin:0 auto;padding:24px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}.stat-value{font-size:28px;font-weight:700;color:#58a6ff;font-family:monospace}.stat-label{font-size:11px;color:#8b949e;margin-top:4px}.textarea-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:16px}.textarea-panel textarea{width:100%;height:300px;background:#0d1117;color:#c9d1d9;border:none;padding:16px;font-family:-apple-system,sans-serif;font-size:14px;resize:vertical;line-height:1.6}.textarea-panel textarea:focus{outline:none}.textarea-panel textarea::placeholder{color:#484f58}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}.btn:hover{background:#30363d}.density-chart{display:flex;gap:2px;align-items:flex-end;height:40px;margin-top:8px}.density-bar{flex:1;min-width:2px;background:#21262d;border-radius:2px 2px 0 0;transition:background .2s}.density-bar.filled{background:#58a6ff}.keyword-section{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-top:16px}.keyword-header{background:#21262d;padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d}.keyword-list{padding:8px 16px;display:flex;flex-wrap:wrap;gap:8px}.keyword-tag{background:#21262d;padding:4px 12px;border-radius:12px;font-size:12px;display:flex;align-items:center;gap:6px}.keyword-count{color:#58a6ff;font-weight:600}</style></head><body><header><h1>📊 Character Counter</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><div class="stats-grid"><div class="stat-card"><div class="stat-value" id="charCount">0</div><div class="stat-label">字符 / Characters</div></div><div class="stat-card"><div class="stat-value" id="charNoSpace">0</div><div class="stat-label">字符(无空格) / Chars (no space)</div></div><div class="stat-card"><div class="stat-value" id="wordCount">0</div><div class="stat-label">单词 / Words</div></div><div class="stat-card"><div class="stat-value" id="sentenceCount">0</div><div class="stat-label">句子 / Sentences</div></div><div class="stat-card"><div class="stat-value" id="paraCount">0</div><div class="stat-label">段落 / Paragraphs</div></div><div class="stat-card"><div class="stat-value" id="lineCount">0</div><div class="stat-label">行 / Lines</div></div></div><div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"><div class="stat-card"><div class="stat-value" id="byteCount">0</div><div class="stat-label">字节 / Bytes</div></div><div class="stat-card"><div class="stat-value" id="readTime">0 min</div><div class="stat-label">阅读时间 (~200词/分)</div></div><div class="stat-card"><div class="stat-value" id="speakTime">0 min</div><div class="stat-label">朗读时间 (~130词/分)</div></div><div class="stat-card"><div class="stat-value" id="cnCharCount">0</div><div class="stat-label">中文字符</div></div></div><div class="toolbar"><button class="btn" onclick="clearText()">🗑 清空</button><button class="btn" onclick="pasteText()">📋 粘贴</button><button class="btn" onclick="copyText()">📋 复制</button><button class="btn" onclick="countExample()">📄 示例文本</button></div><div class="textarea-panel"><textarea id="textInput" placeholder="输入或粘贴文本..." oninput="countAll()"></textarea></div><div class="density-chart" id="densityChart"></div><div class="keyword-section" id="keywordSection" style="display:none"><div class="keyword-header">🔑 高频词 Top 10</div><div class="keyword-list" id="keywordList"></div></div></div><script>var lang="zh";function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}function countAll(){var text=document.getElementById("textInput").value;document.getElementById("charCount").textContent=text.length;document.getElementById("charNoSpace").textContent=text.replace(/\s/g,"").length;var words=text.trim()?text.trim().split(/\s+/).length:0;document.getElementById("wordCount").textContent=words;var cnChars=(text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g)||[]).length;document.getElementById("cnCharCount").textContent=cnChars;var sentences=text.split(/[.!?。！？\n]+/).filter(function(s){return s.trim().length>0}).length;document.getElementById("sentenceCount").textContent=sentences;var paragraphs=text.split(/\n\s*\n/).filter(function(p){return p.trim().length>0}).length;if(text.trim()&&paragraphs===0)paragraphs=1;document.getElementById("paraCount").textContent=paragraphs;var lines=text.split(/\n/).length;document.getElementById("lineCount").textContent=text?lines:0;document.getElementById("byteCount").textContent=new Blob([text]).size;document.getElementById("readTime").textContent=Math.max(1,Math.ceil(words/200))+" min";document.getElementById("speakTime").textContent=Math.max(1,Math.ceil(words/130))+" min";var bars=document.getElementById("densityChart");var chars=text.length;if(chars>0){var segments=20;var segLen=Math.ceil(chars/segments);var html="";for(var i=0;i<segments;i++){var seg=text.substring(i*segLen,(i+1)*segLen);var density=seg.replace(/\s/g,"").length/Math.max(1,seg.length);html+="<div class="density-bar"+(density>0.3?" filled":"")+" style="height:"+Math.max(10,density*40)+"px" title="字符密度: "+Math.round(density*100)+"%"></div>"}bars.innerHTML=html}else{bars.innerHTML=""}var wordFreq={};text.toLowerCase().replace(/[^a-z\u4e00-\u9fff\s]/g,"").split(/\s+/).forEach(function(w){if(w.length>=2){wordFreq[w]=(wordFreq[w]||0)+1}});var sorted=Object.entries(wordFreq).sort(function(a,b){return b[1]-a[1]}).slice(0,10);if(sorted.length>0){document.getElementById("keywordSection").style.display="block";var maxFreq=sorted[0][1];document.getElementById("keywordList").innerHTML=sorted.map(function(_a){var word=_a[0],count=_a[1];return "<span class="keyword-tag">"+word+" <span class="keyword-count">"+count+"</span></span>"}).join("")}else{document.getElementById("keywordSection").style.display="none"}}function clearText(){document.getElementById("textInput").value="";countAll()}function pasteText(){navigator.clipboard.readText().then(function(t){document.getElementById("textInput").value=t;countAll()}).catch(function(){alert("无法读取剪贴板")})}function copyText(){var t=document.getElementById("textInput");t.select();document.execCommand("copy")}function countExample(){document.getElementById("textInput").value="The quick brown fox jumps over the lazy dog. This pangram contains every letter of the English alphabet at least once.\n\nPangrams are often used to display typefaces and test typing equipment. They are also used in some typing games.\n\nThe earliest known appearance of the phrase is from The Michigan School Moderator, a journal that provided educational materials for teachers.\n\n这段文字包含中英文混合内容。在中文里，我们通常以字符数来统计文本长度。而英文则以单词数为主要衡量单位。";countAll()}</script></body></html>
